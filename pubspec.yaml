name: notebook
description: "Notebook by MW"
publish_to: "none"

version: 1.0.0+1

environment:
  sdk: ^3.10.8

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  suffadaemon:
    path: ../suffadaemon
  flutter_riverpod: ^2.5.1
  intl: ^0.20.2
  go_router: ^17.1.0
  drift: ^2.26.0
  drift_flutter: ^0.2.4
  path_provider: ^2.0.0
  bot_toast: ^4.1.3
  flutter_local_notifications: ^18.0.0
  flutter_timezone: ^5.0.1
  timezone: ^0.9.4

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0
  drift_dev: ^2.26.0
  build_runner: ^2.4.13
  flutter_launcher_icons: ^0.14.4

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/images/app_logo.png"

flutter:
  uses-material-design: true

  assets:
    - "assets/images/app_logo.png"
